          <h1 class="title">如何在VBCC中添加豆包ASR识别引擎</h1>
          <div class="meta">Posted on Jun 1, 2026</div>
        </div>
        
        <section class="body">
          <p>首先登录火山引擎，进入<a href="https://console.volcengine.com/speech/">豆包语音控制台</a>，根据提示需要先完成实名认证。</p>
<p><img src="Snipaste_2026-06-02_00-16-34.png" alt="image1"></p>
<p><img src="Snipaste_2026-06-02_00-22-54.png" alt="image2"></p>
<p>按照上图填写，并勾选相应的模型能力即可。确认后豆包将会赠送20h免费时长。</p>
<p><img src="Snipaste_2026-06-02_00-34-37.png" alt="image3">
<img src="Snipaste_2026-06-02_00-34-39.png" alt="image4"></p>
<p>选择侧边栏「豆包流式语音识别模型2.0」，将右侧的 APP ID 和 Access Token 分别填写到 vbcc 的配置页面上，最后点击测试。</p>
