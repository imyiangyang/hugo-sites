<!DOCTYPE html>
<html lang="zh-Hans">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="VBCC — VibeCoding Controller。把 iPhone 变成 Mac 的语音遥控器,说一句话,Mac 就替你打字。">
  <meta property="og:title" content="VBCC — VibeCoding Controller">
  <meta property="og:description" content="把 iPhone 变成 Mac 的语音遥控器,说一句话,Mac 就替你打字。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vbcc.app/">
  <meta property="og:image" content="icon-256.png">
  <title>VBCC — VibeCoding Controller</title>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    rel="stylesheet">

  <style>
    :root {
      --background: hsl(0 0% 3.9%);
      --foreground: hsl(0 0% 98%);
      --card: hsl(0 0% 9%);
      --muted-foreground: hsl(240 5% 64.9%);
      --border: hsl(0 0% 14.9%);
      --ring: hsl(0 0% 60%);
      --accent: hsl(0 0% 100%);
      --radius: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
      background: var(--background);
      color: var(--foreground);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    .mono {
      font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
    }

    main {
      max-width: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade-in 1s ease-out forwards;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Top intro ─────────────────────────────── */
    .intro {
      width: 100%;
      text-align: center;
      padding: 3rem 0 2rem;
    }

    .intro-typewriter {
      font-family: ui-monospace, 'SF Mono', Menlo, Monaco, monospace;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 1.2;
      min-height: 2.4em;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--foreground);
    }

    .cursor {
      display: inline-block;
      width: 0.08em;
      height: 1em;
      background-color: var(--accent);
      margin-left: 0.1em;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* ─── App identity ───────────────────────────── */
    .identity {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      margin-bottom: 1rem;
      display: block;
      object-fit: cover;
    }

    .app-name {
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.01em;
      margin-bottom: 0.5rem;
    }

    .app-tagline {
      font-size: 0.95rem;
      color: var(--muted-foreground);
      max-width: 28em;
      line-height: 1.6;
      text-align: center;
    }

    /* ─── CTA ───────────────────────────────────── */
    .cta {
      margin: 2rem 0 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .cta-buttons {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
      padding-bottom: 0.5rem;
    }

    /* iMessage-style bubble buttons — pill body + SVG tail */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.95rem 1.6rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      border: none;
      transition: transform 0.15s ease, filter 0.2s, box-shadow 0.2s;
    }

    .btn:active { transform: scale(0.97); }

    /* SVG tail: sits below the pill, pokes downward from a bottom corner */
    .btn-tail {
      position: absolute;
      bottom: -6px;
      width: 16px;
      height: 14px;
      pointer-events: none;
      display: block;
    }

    /* ─── Blue iMessage-sent bubble — tail on bottom right ─── */
    .btn-primary {
      background: #0A84FF;
      color: #fff;
      box-shadow: 0 6px 18px rgba(10, 132, 255, 0.25);
    }

    .btn-primary .btn-tail { right: 4px; fill: #0A84FF; }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
      box-shadow: 0 10px 28px rgba(10, 132, 255, 0.4);
    }

    /* ─── Grey iMessage-received bubble — tail on bottom left ─── */
    .btn-secondary {
      background: #B5B5BA;
      color: #1a1a1a;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    .btn-secondary .btn-tail { left: 4px; fill: #B5B5BA; transform: scaleX(-1); }

    .btn-secondary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
    }

    .btn-platform {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      opacity: 0.7;
      letter-spacing: 0.04em;
    }

    /* ─── Disabled App Store badge — coming soon ─── */
    .appstore-coming {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      margin-top: 1.5rem;
      cursor: not-allowed;
      user-select: none;
    }

    .appstore-badge {
      height: 44px;
      width: auto;
      filter: grayscale(1) brightness(0.85);
      opacity: 0.45;
      transition: opacity 0.2s, filter 0.2s;
    }

    .appstore-coming:hover .appstore-badge {
      opacity: 0.6;
      filter: grayscale(1) brightness(0.95);
    }

    .appstore-coming-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted-foreground);
      letter-spacing: 0.04em;
      opacity: 0.7;
    }

    .cta-note {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      letter-spacing: 0.02em;
      text-align: center;
      max-width: 32em;
      line-height: 1.6;
    }

    /* ─── Sections ─────────────────────────────── */
    section {
      width: 100%;
      padding: 3rem 0;
      border-top: 1px solid var(--border);
    }

    .section-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: clamp(1.5rem, 3.5vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.25;
      margin-bottom: 2rem;
    }

    /* ─── What is VBCC explainer ───────────────── */
    .explainer p {
      font-size: 1rem;
      color: var(--muted-foreground);
      line-height: 1.75;
      margin-bottom: 1rem;
    }

    .explainer strong {
      color: var(--foreground);
      font-weight: 500;
    }

    .acronym {
      display: inline-flex;
      gap: 0.4em;
      flex-wrap: wrap;
      align-items: baseline;
      margin: 1rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
    }

    .acronym .letter {
      color: var(--accent);
      font-weight: 600;
    }

    .acronym .word {
      color: var(--muted-foreground);
    }

    /* ─── Feature list ─────────────────────────── */
    .features {
      display: grid;
      gap: 0.75rem;
    }

    .feature {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.25rem;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .feature:hover {
      border-color: hsl(0 0% 22%);
      background: hsl(0 0% 11%);
    }

    .feature-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
      letter-spacing: -0.01em;
    }

    .feature-desc {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      line-height: 1.6;
    }

    /* ─── FAQ ──────────────────────────────────── */
    .faq-item {
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .faq-item:last-child {
      border-bottom: none;
    }

    .faq-q {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .faq-a {
      font-size: 0.9rem;
      color: var(--muted-foreground);
      line-height: 1.7;
    }

    .faq-a a {
      color: var(--foreground);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: hsl(0 0% 30%);
      transition: text-decoration-color 0.2s;
    }

    .faq-a a:hover {
      text-decoration-color: var(--foreground);
    }

    /* ─── Footer ───────────────────────────────── */
    footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      width: 100%;
      max-width: 640px;
      font-size: 0.75rem;
      color: var(--muted-foreground);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.85rem;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    footer:hover,
    footer:has(.lang-dropdown.open) {
      opacity: 1;
    }

    footer a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: hsl(0 0% 25%);
      transition: text-decoration-color 0.2s, opacity 0.2s;
    }

    footer a:hover {
      text-decoration-color: var(--foreground);
    }

    .sep {
      opacity: 0.4;
      user-select: none;
      pointer-events: none;
    }

    .lang-switcher {
      position: relative;
      margin-left: auto;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: inherit;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.2s;
    }

    .lang-btn:hover {
      opacity: 1;
    }

    .lang-dropdown {
      display: none;
      position: absolute;
      bottom: 100%;
      right: 0;
      margin-bottom: 0.5rem;
      background: #222;
      border: 1px solid #444;
      border-radius: var(--radius);
      padding: 0.25rem 0;
      min-width: 120px;
      z-index: 50;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.8);
    }

    .lang-dropdown.open { display: block; }

    .lang-option {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--muted-foreground);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.75rem;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    .lang-option:hover {
      background: #333;
      color: var(--foreground);
    }

    .lang-option.active {
      color: var(--foreground);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 480px) {
      body { padding: 1.5rem 1rem; }
      .intro { padding: 2rem 0 1.5rem; }
      section { padding: 2.5rem 0; }
    }
  </style>
</head>

    const langNames = {
      "zh-Hans": "简体中文",
      "zh-Hant": "繁體中文",
      "en": "English",
      "ja": "日本語",
      "ko": "한국어"
    };

    /* ─── Apply language ───────────────────────── */
    function applyLang(lang) {
      const t = i18n[lang];
      if (!t) return;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.innerHTML = t[key];
      });
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.classList.toggle('active', opt.getAttribute('data-lang') === lang);
      });
      const btn = document.getElementById('lang-btn');
      if (btn) btn.textContent = langNames[lang] + ' ▾';
      document.documentElement.lang = lang;
      if (t.page_title) document.title = t.page_title;
      startTypewriter(t.typewriter);
    }

    /* ─── Detect language ──────────────────────── */
    function detectLang() {
      const hashMatch = location.hash.match(/lang=([a-zA-Z-]+)/);
      if (hashMatch && i18n[hashMatch[1]]) return hashMatch[1];
      try {
        const stored = localStorage.getItem('vbcc_lang');
        if (stored && i18n[stored]) return stored;
      } catch (e) {}
      const nav = (navigator.language || 'en').toLowerCase();
      if (nav.startsWith('zh')) {
        if (nav.includes('hant') || nav.includes('tw') || nav.includes('hk') || nav.includes('mo')) return 'zh-Hant';
        return 'zh-Hans';
      }
      if (nav.startsWith('ja')) return 'ja';
      if (nav.startsWith('ko')) return 'ko';
      return 'en';
    }

    /* ─── Typewriter ───────────────────────────── */
    let typewriterToken = 0;
    async function startTypewriter(words) {
      const el = document.getElementById('typewriter');
      if (!el || !words || !words.length) return;
      const myToken = ++typewriterToken;
      el.textContent = '';
      const sleep = ms => new Promise(r => setTimeout(r, ms));
      await sleep(400);
      // Type word 1
      const w1 = words[0];
      for (let i = 0; i <= w1.length; i++) {
        if (myToken !== typewriterToken) return;
        el.textContent = w1.slice(0, i);
        await sleep(80);
      }
      await sleep(900);
      if (words.length < 2) return;
      // Delete word 1
      for (let i = w1.length; i >= 0; i--) {
        if (myToken !== typewriterToken) return;
        el.textContent = w1.slice(0, i);
        await sleep(50);
      }
      await sleep(300);
      // Type word 2
      const w2 = words[1];
      for (let i = 0; i <= w2.length; i++) {
        if (myToken !== typewriterToken) return;
        el.textContent = w2.slice(0, i);
        await sleep(80);
      }
    }

    /* ─── Build language dropdown ──────────────── */
    (function () {
      const dropdown = document.getElementById('lang-dropdown');
      const toggleBtn = document.getElementById('lang-btn');
      Object.keys(langNames).forEach(code => {
        const opt = document.createElement('button');
        opt.className = 'lang-option mono';
        opt.setAttribute('data-lang', code);
        opt.setAttribute('role', 'menuitem');
        opt.textContent = langNames[code];
        opt.addEventListener('click', () => {
          location.hash = 'lang=' + code;
          try { localStorage.setItem('vbcc_lang', code); } catch (e) {}
          applyLang(code);
          dropdown.classList.remove('open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        });
        dropdown.appendChild(opt);
      });
      toggleBtn.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = dropdown.classList.toggle('open');
        toggleBtn.setAttribute('aria-expanded', String(isOpen));
      });
      document.addEventListener('click', () => {
        dropdown.classList.remove('open');
        toggleBtn.setAttribute('aria-expanded', 'false');
      });
    })();

    /* ─── Init ─────────────────────────────────── */
    applyLang(detectLang());
    window.addEventListener('hashchange', () => applyLang(detectLang()));
  </script>
